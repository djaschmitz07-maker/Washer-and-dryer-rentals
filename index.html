<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Delivery Sign Up</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.1); width: 400px; max-width: 90%; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; background: #007bff; color: white; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: .9; }
    </style>
</head>
<body>

<div class="form-container">

    <h2>Test Delivery Sign Up</h2>
    <p>Fill this out once to activate your GitHub form server loop.</p>

    <!-- Secure open-access FormSubmit gateway explicitly mapped to your email address -->
    <form action="https://formsubmit.co" method="POST">

        <!-- Disable CAPTCHA verification so it submits instantly -->
        <input type="hidden" name="_captcha" value="false">

        <input type="text" name="Name" placeholder="Your Name" required>
        <input type="email" name="Email" placeholder="Your Email" required>
        <input type="tel" name="Phone" placeholder="Your Phone Number" required>

        <button type="submit">
            Send Test Request
        </button>

    </form>

</div>

</body>
</html>
